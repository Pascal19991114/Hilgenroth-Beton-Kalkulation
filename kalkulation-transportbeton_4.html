<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulation Transportbeton – Hilgenroth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
  :root{
    --rot:#C8102E;
    --rot-dunkel:#9C0C22;
    --schwarz:#171717;
    --grau-900:#232323;
    --grau-700:#4a4a4a;
    --grau-500:#7a7a7a;
    --grau-300:#d6d3ce;
    --grau-100:#eeece8;
    --weiss:#ffffff;
    --gruen:#1b7a3d;
    --gruen-bg:#e7f3ea;
    --gelb:#8a6d00;
    --gelb-bg:#fdf3d6;
    --rot-bg:#fbe6e6;
    --radius:3px;
    --font-ui:'IBM Plex Sans',system-ui,sans-serif;
    --font-num:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--font-ui);
    background:var(--grau-100);
    color:var(--grau-900);
    font-size:14px;
    line-height:1.4;
  }
  .app{
    display:grid;
    grid-template-columns:320px 1fr;
    min-height:100vh;
  }
  /* ---------- HEADER ---------- */
  header.top{
    grid-column:1 / -1;
    background:var(--schwarz);
    color:var(--weiss);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    height:56px;
    border-bottom:4px solid var(--rot);
  }
  header.top .brand{
    display:flex;
    align-items:center;
    gap:12px;
  }
  header.top .brand .mark{
    width:10px;height:28px;background:var(--rot);
  }
  header.top .brand h1{
    font-size:16px;
    font-weight:600;
    margin:0;
    letter-spacing:.2px;
  }
  header.top .brand small{
    display:block;
    color:var(--grau-300);
    font-size:11px;
    font-weight:400;
  }
  header.top .actions{display:flex;gap:8px;align-items:center;}
  header.top .conn{
    font-size:11px;
    color:var(--grau-300);
    display:flex;align-items:center;gap:6px;
    font-family:var(--font-num);
  }
  header.top .conn .dot{width:7px;height:7px;border-radius:50%;background:var(--grau-500);}
  header.top .conn.online .dot{background:#4caf50;}
  header.top .conn.offline .dot{background:var(--rot);}

  /* ---------- BUTTONS ---------- */
  button{
    font-family:var(--font-ui);
    cursor:pointer;
    border:none;
    border-radius:var(--radius);
    font-size:13px;
    font-weight:600;
    padding:8px 14px;
    transition:background .12s ease, transform .05s ease;
  }
  button:active{transform:translateY(1px);}
  .btn-primary{background:var(--rot);color:#fff;}
  .btn-primary:hover{background:var(--rot-dunkel);}
  .btn-dark{background:var(--schwarz);color:#fff;}
  .btn-dark:hover{background:#000;}
  .btn-ghost{background:transparent;color:var(--grau-900);border:1px solid var(--grau-300);}
  .btn-ghost:hover{background:var(--grau-100);}
  .btn-ghost.on-dark{color:#fff;border-color:#555;}
  .btn-ghost.on-dark:hover{background:#2a2a2a;}
  .btn-danger{background:var(--rot-bg);color:var(--rot-dunkel);border:1px solid #e3a6a6;}
  .btn-danger:hover{background:#f6d3d3;}
  button:disabled{opacity:.45;cursor:not-allowed;}
  button.icon{padding:8px 10px;}

  /* ---------- SIDEBAR ---------- */
  aside.sidebar{
    background:var(--weiss);
    border-right:1px solid var(--grau-300);
    display:flex;
    flex-direction:column;
    max-height:calc(100vh - 56px);
    overflow:hidden;
  }
  .sidebar .sidebar-head{
    padding:14px 14px 10px 14px;
    border-bottom:1px solid var(--grau-100);
  }
  .sidebar input[type=search]{
    width:100%;
    padding:8px 10px;
    border:1px solid var(--grau-300);
    border-radius:var(--radius);
    font-family:var(--font-ui);
    font-size:13px;
  }
  .sidebar .new-btn{width:100%;margin-top:8px;}
  .project-list{
    overflow-y:auto;
    flex:1;
    padding:6px;
  }
  .project-card{
    padding:10px 10px;
    border-radius:var(--radius);
    border:1px solid transparent;
    cursor:pointer;
    margin-bottom:4px;
  }
  .project-card:hover{background:var(--grau-100);}
  .project-card.active{
    background:#fff3f3;
    border-color:var(--rot);
  }
  .project-card .row1{
    display:flex;justify-content:space-between;align-items:baseline;
    font-size:12px;font-family:var(--font-num);color:var(--grau-500);
  }
  .project-card .kunde{
    font-weight:600;font-size:14px;margin-top:2px;
  }
  .project-card .bauvorhaben{
    font-size:12px;color:var(--grau-700);
  }
  .badge{
    display:inline-block;
    font-size:10px;
    font-weight:700;
    padding:2px 6px;
    border-radius:10px;
    font-family:var(--font-num);
    margin-top:6px;
  }
  .badge.ok{background:var(--gruen-bg);color:var(--gruen);}
  .badge.warn{background:var(--gelb-bg);color:var(--gelb);}
  .badge.bad{background:var(--rot-bg);color:var(--rot-dunkel);}
  .sidebar-empty{
    padding:30px 16px;color:var(--grau-500);font-size:13px;text-align:center;
  }
  .sidebar-foot{
    padding:10px 14px;
    border-top:1px solid var(--grau-100);
    display:flex;justify-content:space-between;align-items:center;
  }
  .sidebar-foot button{font-size:11px;padding:6px 8px;}

  /* ---------- MAIN ---------- */
  main{
    padding:24px 32px 60px 32px;
    max-width:980px;
  }
  .doc-head{
    display:flex;justify-content:space-between;align-items:flex-start;
    margin-bottom:18px;
  }
  .doc-head h2{
    margin:0 0 2px 0;font-size:20px;
  }
  .doc-head .nr{
    font-family:var(--font-num);color:var(--grau-500);font-size:13px;
  }
  .doc-actions{display:flex;gap:8px;}

  section.card{
    background:var(--weiss);
    border:1px solid var(--grau-300);
    border-radius:6px;
    margin-bottom:16px;
    overflow:hidden;
  }
  section.card .card-head{
    background:var(--grau-100);
    padding:10px 16px;
    font-weight:700;
    font-size:12px;
    letter-spacing:.4px;
    text-transform:uppercase;
    color:var(--grau-700);
    border-bottom:1px solid var(--grau-300);
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  section.card .card-head .stripe{
    display:inline-block;width:4px;height:14px;background:var(--rot);margin-right:8px;vertical-align:middle;
  }
  .card-body{padding:16px;}
  .grid{
    display:grid;
    gap:14px;
  }
  .grid.c2{grid-template-columns:1fr 1fr;}
  .grid.c3{grid-template-columns:1fr 1fr 1fr;}
  .grid.c4{grid-template-columns:1fr 1fr 1fr 1fr;}
  .field{display:flex;flex-direction:column;gap:4px;}
  .field label{
    font-size:11.5px;font-weight:600;color:var(--grau-700);
    text-transform:uppercase;letter-spacing:.3px;
  }
  .field input[type=text],
  .field input[type=number],
  .field input[type=date],
  .field select{
    padding:8px 9px;
    border:1px solid var(--grau-300);
    border-radius:var(--radius);
    font-family:var(--font-num);
    font-size:14px;
    background:#fff;
    color:var(--grau-900);
  }
  .field input:focus,.field select:focus{
    outline:none;border-color:var(--rot);box-shadow:0 0 0 2px rgba(200,16,46,.12);
  }
  .field.readonly input{
    background:var(--grau-100);color:var(--grau-700);font-weight:600;
  }
  .field .hint{font-size:11px;color:var(--grau-500);font-family:var(--font-ui);}
  .field .unit{font-size:11px;color:var(--grau-500);font-family:var(--font-num);}
  .checkbox-row{display:flex;align-items:center;gap:8px;padding-top:6px;}
  .checkbox-row input{width:16px;height:16px;accent-color:var(--rot);}
  .checkbox-row label{font-size:13px;font-weight:600;color:var(--grau-900);text-transform:none;}
  a.route-link{
    font-size:12px;color:var(--rot-dunkel);text-decoration:none;font-weight:600;
  }
  a.route-link:hover{text-decoration:underline;}

  /* results */
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .kpi{
    border:1px solid var(--grau-300);border-radius:var(--radius);padding:12px;
    background:var(--grau-100);
  }
  .kpi .label{font-size:11px;text-transform:uppercase;color:var(--grau-700);font-weight:700;letter-spacing:.3px;}
  .kpi .value{font-family:var(--font-num);font-size:20px;font-weight:700;margin-top:4px;}
  .kpi.neg .value{color:var(--rot-dunkel);}
  .kpi.pos .value{color:var(--gruen);}

  .warn-box{
    display:flex;gap:10px;align-items:flex-start;
    padding:10px 12px;border-radius:var(--radius);margin-top:10px;font-size:13px;
  }
  .warn-box.bad{background:var(--rot-bg);color:var(--rot-dunkel);border:1px solid #e3a6a6;}
  .warn-box.warn{background:var(--gelb-bg);color:var(--gelb);border:1px solid #e4d18f;}
  .warn-box.ok{background:var(--gruen-bg);color:var(--gruen);border:1px solid #a9d9b6;}
  .warn-box b{font-family:var(--font-num);}

  table.breakdown{width:100%;border-collapse:collapse;font-family:var(--font-num);font-size:13px;}
  table.breakdown th{
    text-align:left;font-family:var(--font-ui);text-transform:uppercase;font-size:10.5px;
    color:var(--grau-700);border-bottom:1px solid var(--grau-300);padding:6px 8px;
  }
  table.breakdown td{padding:6px 8px;border-bottom:1px solid var(--grau-100);}
  table.breakdown td.num,table.breakdown th.num{text-align:right;}
  table.breakdown tr.total td{font-weight:700;border-top:2px solid var(--grau-900);border-bottom:none;}

  .sig-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:6px;}
  .sig-line{border-top:1px solid var(--grau-900);margin-top:36px;padding-top:4px;font-size:11px;color:var(--grau-700);}

  /* ---------- MODAL ---------- */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(20,20,20,.55);
    display:flex;align-items:center;justify-content:center;z-index:100;
  }
  .modal{
    background:#fff;border-radius:8px;max-width:640px;width:92%;
    max-height:86vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.35);
  }
  .modal-head{
    padding:16px 20px;border-bottom:1px solid var(--grau-300);
    display:flex;justify-content:space-between;align-items:center;
  }
  .modal-head h3{margin:0;font-size:16px;}
  .modal-body{padding:18px 20px;}
  .modal-foot{padding:14px 20px;border-top:1px solid var(--grau-300);display:flex;justify-content:flex-end;gap:8px;}
  .modal input[type=password],.modal input[type=text],.modal input[type=number]{
    width:100%;padding:9px 10px;border:1px solid var(--grau-300);border-radius:var(--radius);
    font-family:var(--font-num);font-size:14px;
  }
  .modal.wide{max-width:860px;}
  .tab-bar{display:flex;gap:6px;margin-bottom:18px;border-bottom:1px solid var(--grau-300);}
  .tab-btn{
    background:transparent;border:none;border-bottom:2px solid transparent;
    padding:9px 4px;margin-right:14px;font-size:13px;font-weight:600;color:var(--grau-500);
    border-radius:0;
  }
  .tab-btn:hover{color:var(--grau-900);background:transparent;}
  .tab-btn.active{color:var(--rot-dunkel);border-bottom-color:var(--rot);}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}
  .import-row{display:flex;align-items:center;gap:10px;background:var(--grau-100);border-radius:var(--radius);padding:10px 12px;margin-bottom:12px;font-size:12.5px;color:var(--grau-700);}
  .import-row input[type=file]{font-size:12px;}

  .price-table{width:100%;border-collapse:collapse;font-size:12.5px;font-family:var(--font-num);}
  .price-table th{position:sticky;top:0;background:#fff;text-align:left;padding:6px 6px;border-bottom:1px solid var(--grau-300);font-family:var(--font-ui);text-transform:uppercase;font-size:10px;color:var(--grau-700);}
  .price-table td{padding:5px 6px;border-bottom:1px solid var(--grau-100);}
  .price-table td.num{text-align:right;}
  .price-table input{width:100%;border:1px solid transparent;background:transparent;font-family:var(--font-num);padding:3px 4px;border-radius:2px;}
  .price-table input:focus{border-color:var(--rot);background:#fff;outline:none;}
  .price-scroll{max-height:340px;overflow-y:auto;border:1px solid var(--grau-300);border-radius:var(--radius);}

  .toast{
    position:fixed;bottom:20px;right:24px;background:var(--schwarz);color:#fff;
    padding:12px 18px;border-radius:6px;font-size:13px;font-weight:600;
    box-shadow:0 8px 24px rgba(0,0,0,.3);z-index:200;
    display:flex;align-items:center;gap:10px;
  }
  .toast.err{background:var(--rot-dunkel);}
  .toast .stripe{width:4px;height:16px;background:var(--rot);}
  .toast.err .stripe{background:#fff;}

  ::-webkit-scrollbar{width:9px;height:9px;}
  ::-webkit-scrollbar-thumb{background:var(--grau-300);border-radius:6px;}
  ::-webkit-scrollbar-thumb:hover{background:var(--grau-500);}

  /* ---------- PRINT ---------- */
  @media print{
    aside.sidebar, header.top, .doc-actions, .no-print{display:none !important;}
    body{background:#fff;}
    .app{display:block;}
    main{padding:0;max-width:none;}
    section.card{border:1px solid #999;box-shadow:none;break-inside:avoid;}
    section.card .card-head{background:#eee !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .kpi{background:#f2f2f2 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    @page{size:A4;margin:14mm 12mm;}
  }
</style>
</head>
<body>

<div class="app" id="appRoot" style="display:none;">
  <header class="top">
    <div class="brand">
      <div class="mark"></div>
      <div>
        <h1>Kalkulation Transportbeton</h1>
        <small>Rudolf Hilgenroth GmbH &amp; Co. KG</small>
      </div>
    </div>
    <div class="actions">
      <span id="connState" class="conn offline"><span class="dot"></span>verbinde…</span>
      <button class="btn-ghost on-dark icon" id="btnAdmin" title="Einstellungen (Preise, Parameter)">⚙ Einstellungen</button>
      <button class="btn-ghost on-dark icon" id="btnLogout" title="Abmelden">⎋ Abmelden</button>
    </div>
  </header>

  <aside class="sidebar">
    <div class="sidebar-head">
      <input type="search" id="searchBox" placeholder="Suche: Kunde, Bauvorhaben, Angebots-Nr…">
      <button class="btn-primary new-btn" id="btnNew">+ Neue Kalkulation</button>
    </div>
    <div class="project-list" id="projectList">
      <div class="sidebar-empty">Lade gespeicherte Kalkulationen…</div>
    </div>
    <div class="sidebar-foot">
      <span id="countInfo" style="font-size:11px;color:var(--grau-500);font-family:var(--font-num);">0 Kalkulationen</span>
      <button class="btn-ghost" id="btnExport" style="font-size:11px;">Export CSV</button>
    </div>
  </aside>

  <main id="mainArea">
    <!-- filled by JS -->
  </main>
</div>

<div id="loginScreen" style="position:fixed;inset:0;background:var(--grau-100);display:flex;align-items:center;justify-content:center;z-index:50;">
  <div style="background:#fff;border:1px solid var(--grau-300);border-radius:8px;width:340px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.15);overflow:hidden;">
    <div style="background:var(--schwarz);border-bottom:4px solid var(--rot);padding:18px 22px;display:flex;align-items:center;gap:12px;">
      <div style="width:10px;height:26px;background:var(--rot);"></div>
      <div>
        <div style="color:#fff;font-weight:600;font-size:15px;">Kalkulation Transportbeton</div>
        <div style="color:var(--grau-300);font-size:11px;">Rudolf Hilgenroth GmbH &amp; Co. KG</div>
      </div>
    </div>
    <div style="padding:22px;">
      <div class="field" style="margin-bottom:12px;">
        <label>E-Mail</label>
        <input type="text" id="loginEmail" autocomplete="username">
      </div>
      <div class="field" style="margin-bottom:16px;">
        <label>Passwort</label>
        <input type="password" id="loginPassword" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="btnLogin" style="width:100%;">Anmelden</button>
      <div id="loginError" style="color:var(--rot-dunkel);font-size:12.5px;margin-top:10px;display:none;"></div>
      <div style="color:var(--grau-500);font-size:11.5px;margin-top:14px;">Zugang nur für autorisierte Nutzer. Konten werden manuell in der Firebase Console angelegt.</div>
    </div>
  </div>
</div>

<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script type="module">
/* =========================================================================
   HILGENROTH – KALKULATION TRANSPORTBETON
   Single-file HTML tool. Firebase Realtime Database als Datenschicht.
   Struktur:
     /kalkulationen/{id}
     /settings/parameter
     /settings/sorten/{sorteCode}
     /meta/counter
   ========================================================================= */

/* ---------------------------------------------------------------------
   1) FIREBASE CONFIG  – bitte eintragen (Projekt via Firebase Console)
   --------------------------------------------------------------------- */
const firebaseConfig = {
  apiKey: "AIzaSyDX-K_Bj03INdS7Dtm_701wI9zGF5mwfl8",
  authDomain: "beton-kalkulation.firebaseapp.com",
  // TODO: bitte prüfen/anpassen – genaue Realtime-Database-URL steht in der
  // Firebase Console unter "Realtime Database" oben auf der Seite.
  // Format hängt von der Region ab, in der die DB angelegt wurde, z.B.:
  //   europe-west1:  https://beton-kalkulation-default-rtdb.europe-west1.firebasedatabase.app
  //   us-central1:   https://beton-kalkulation-default-rtdb.firebaseio.com
  databaseURL: "https://beton-kalkulation-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "beton-kalkulation",
  storageBucket: "beton-kalkulation.firebasestorage.app",
  messagingSenderId: "403651646517",
  appId: "1:403651646517:web:e612f412fbe91193f7cd7c"
};

// Admin-Passwort für Preislisten- / Parameter-Bearbeitung (rein clientseitig,
// analog zu den anderen Hilgenroth-Tools – kein Ersatz für echte Rechteverwaltung)
const ADMIN_PASSWORD = "hilgenroth2026";

// E-Mail-Adresse mit reduzierter "Chef-Ansicht" (nur Freigabe + Nachlass-Korrektur,
// keine Preislisten-/Parameter-Bearbeitung, keine neuen Kalkulationen).
const CHEF_EMAILS = ["r59.hilgenroth@web.de"];
let currentUserEmail = '';
function isChef(){ return CHEF_EMAILS.includes((currentUserEmail||'').toLowerCase()); }

/* ---------------------------------------------------------------------
   2) FIREBASE SDK (modular, per CDN)
   --------------------------------------------------------------------- */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getDatabase, ref, get, set, push, update, remove, onValue, runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getDatabase(fbApp);

const connEl = document.getElementById('connState');
function setConn(state, label){
  if (!connEl) return;
  connEl.className = 'conn ' + state;
  connEl.innerHTML = '<span class="dot"></span>' + label;
}

const loginScreen = document.getElementById('loginScreen');
const appRoot = document.getElementById('appRoot');
const loginError = document.getElementById('loginError');

function showLogin(){
  loginScreen.style.display = 'flex';
  appRoot.style.display = 'none';
}
function showApp(){
  loginScreen.style.display = 'none';
  appRoot.style.display = 'grid';
}

onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUserEmail = user.email || '';
    showApp();
    setConn('online', 'verbunden · ' + currentUserEmail);
    applyRoleUI();
    boot();
  } else {
    currentUserEmail = '';
    showLogin();
  }
});

document.getElementById('btnLogin').addEventListener('click', doLogin);
document.getElementById('loginPassword').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doLogin();
});
function doLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  loginError.style.display = 'none';
  if (!email || !password){
    loginError.textContent = 'Bitte E-Mail und Passwort eingeben.';
    loginError.style.display = 'block';
    return;
  }
  signInWithEmailAndPassword(auth, email, password).catch(err => {
    let msg = 'Anmeldung fehlgeschlagen.';
    if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found'){
      msg = 'E-Mail oder Passwort falsch.';
    } else if (err.code === 'auth/too-many-requests'){
      msg = 'Zu viele Fehlversuche. Bitte kurz warten.';
    }
    loginError.textContent = msg;
    loginError.style.display = 'block';
  });
}
document.getElementById('btnLogout').addEventListener('click', () => {
  if (unsavedDirty && !confirm('Ungespeicherte Änderungen verwerfen?')) return;
  signOut(auth);

  verzoegererZuschlagProM3: 4,      // O26 – Zuschlag bei Verzögerer
  minRoherlösProzent: 0.35,         // F37 – Mindestroherlös (intern, von GL zu bestätigen)
  dbZielProzent: 0.20,              // F39 – DB1-Zielwert (repariert: war in Excel nie aktiv, Vergleich mit "20" statt "20%")
  minDbProzent: 0.12,               // F40 – absolute Mindest-DB1-Grenze
  preiswechselDatum: "2026-06-15"   // Stichtag für Preisspalte "Preis 15.06.26"
};

let sorten = [];       // aktuelle Sortenliste (aus Firebase oder Seed)
let parameter = {...SEED_PARAMETER};
let kunden = [];       // Kundenstammdaten
let bauvorhaben = [];  // Bauvorhaben-Stammdaten
let projekte = {};     // id -> Kalkulation
let currentId = null;  // aktuell bearbeitete Kalkulation (null = neu/ungespeichert)
let currentDraft = null;
let unsavedDirty = false;

function toast(msg, isErr){
  const root = document.getElementById('toastRoot');
  const el = document.createElement('div');
  el.className = 'toast' + (isErr ? ' err' : '');
  el.innerHTML = '<span class="stripe"></span><span>' + msg + '</span>';
  root.appendChild(el);
  setTimeout(() => el.remove(), 3600);
}

async function boot(){
  // Sorten laden, ggf. seeden
  const sortenSnap = await get(ref(db, 'settings/sorten'));
  if (!sortenSnap.exists()) {
    const seedObj = {};
    SEED_SORTEN.forEach(s => { seedObj[String(s.sorte)] = s; });
    await set(ref(db, 'settings/sorten'), seedObj);
  }
  onValue(ref(db, 'settings/sorten'), (snap) => {
    const val = snap.val() || {};
    sorten = Object.values(val).sort((a,b) => String(a.sorte).localeCompare(String(b.sorte)));
    renderSortenDatalist();
  });

  // Parameter laden, ggf. seeden
  const paramSnap = await get(ref(db, 'settings/parameter'));
  if (!paramSnap.exists()) {
    await set(ref(db, 'settings/parameter'), SEED_PARAMETER);
  }
  onValue(ref(db, 'settings/parameter'), (snap) => {
    parameter = { ...SEED_PARAMETER, ...(snap.val() || {}) };
    if (currentDraft) render();
  });

  // Kunden- und Bauvorhaben-Stammdaten laden (live)
  onValue(ref(db, 'settings/kunden'), (snap) => {
    const val = snap.val() || {};
    kunden = Object.entries(val).map(([id,k]) => ({...k, id})).sort((a,b) => (a.name||'').localeCompare(b.name||''));
    renderKundenDatalist();
  });
  onValue(ref(db, 'settings/bauvorhaben'), (snap) => {
    const val = snap.val() || {};
    bauvorhaben = Object.entries(val).map(([id,b]) => ({...b, id})).sort((a,b) => (a.name||'').localeCompare(b.name||''));
    renderBauvorhabenDatalist();
  });

  // Kalkulationen laden (live)
  onValue(ref(db, 'kalkulationen'), (snap) => {
    projekte = snap.val() || {};
    renderProjectList();
    if (currentId && !projekte[currentId]) {
      // aktuell offenes Projekt wurde gelöscht (z.B. an anderem Rechner)
    }
  });

  if (isChef()){
    showChefEmptyState();
  } else {
    newDraft();
  }
}

/* ---------------------------------------------------------------------
   4) BERECHNUNGSLOGIK  (repliziert & korrigiert nach "11_05_Kalkulation
      für den Angebotsersteller.xlsx", Blatt "Kalkulation mit NEU EKZ")
   --------------------------------------------------------------------- */
function findSorte(code){
  if (code == null || code === '') return null;
  return sorten.find(s => String(s.sorte) === String(code)) || null;
}

function priceForSorte(sorteObj, datumISO){
  if (!sorteObj) return 0;
  const cutoff = parameter.preiswechselDatum;
  if (datumISO && cutoff && datumISO >= cutoff && sorteObj.preis_neu != null) {
    return sorteObj.preis_neu;
  }
  return sorteObj.preis != null ? sorteObj.preis : 0;
}

function round2(n){ return Math.round((n + Number.EPSILON) * 100) / 100; }

function calcKalkulation(d){
  const sorteObj = findSorte(d.sorte);
  const materialkosten = round2(sorteObj && sorteObj.ek != null ? sorteObj.ek : 0);   // D13
  const sortenpreis = round2(priceForSorte(sorteObj, d.datum));                        // D30

  const volumen = Number(d.volumen) || 0;                                            // D10
  const ladungProFahrzeug = Number(d.ladungProFahrzeug) || parameter.standardLadung;  // D17
  const fahrtdauerMin = Number(d.fahrtdauerMin) || 0;                                 // F24
  const fahrtdauerH = fahrtdauerMin / 60;                                             // D24
  const selbstabholung = fahrtdauerH === 0;

  // P9 – Fuhrenanzahl: bewusst auf Basis des kleinsten Fahrzeugs (Standardladung),
  // unabhängig von der tatsächlich geplanten Ladung D17 (so von Pascal bestätigt:
  // konservative Tourenplanung mit dem 6m³-Fahrzeug, auch wenn 8m³-Fahrzeuge existieren).
  const standardLadung = parameter.standardLadung;
  const fuhrenAnzahl = volumen < standardLadung ? 1 : Math.floor(volumen / standardLadung); // P9

  const transportkostenJeFuhre = parameter.lkwKostenProStunde * fahrtdauerH;           // M10
  const transportkostenProM3 = volumen > 0
    ? (fahrtdauerH * parameter.lkwKostenProStunde * fuhrenAnzahl / volumen)
    : 0;                                                                              // M11

  const selbstkostenI = transportkostenProM3 + parameter.mischenProM3;                // D28

  // -------- Zuschläge (pro m³) --------
  const mindermengeSatz = (!selbstabholung && ladungProFahrzeug < standardLadung)
    ? parameter.mindermengeZuschlagProM3 : 0;                                          // O21
  const mindermengeMenge = standardLadung - ladungProFahrzeug;                         // P21
  const mindermengeBetrag = mindermengeSatz * mindermengeMenge;                        // Q21

  const energieSatz = parameter.energieZuschlagProM3;                                  // O22
  const energieBetrag = energieSatz * volumen;                                         // Q22

  const transportZuschlagSatz = selbstabholung ? 0 : (Number(d.transportZuschlag) >= 0
    ? Number(d.transportZuschlag) : parameter.transportZuschlagProM3);                 // O23 (jetzt mit D19 verknüpft statt hart codiert)
  const transportZuschlagBetrag = transportZuschlagSatz * volumen;                     // Q23

  const werkServiceSatz = selbstabholung ? parameter.werkServiceZuschlagProM3 : 0;      // O24
  const werkServiceBetrag = werkServiceSatz * volumen;                                  // Q24

  const selbstabholerSatz = selbstabholung ? -parameter.selbstabholerVerguetungProM3 : 0; // O25
  const selbstabholerBetrag = selbstabholerSatz * volumen;                              // Q25

  const verzoegererSatz = d.verzoegerer ? parameter.verzoegererZuschlagProM3 : 0;        // O26
  const verzoegererBetrag = verzoegererSatz * volumen;                                   // Q26

  const nachlass = Number(d.nachlass) || 0;                                             // D32
  const angebotspreis = sortenpreis - nachlass;                                          // D34
  const zuschlaegeProM3 = energieSatz + transportZuschlagSatz + verzoegererSatz + werkServiceSatz + selbstabholerSatz; // G34

  const grundbetrag = angebotspreis * volumen;                                          // Q20
  const nettobetrag = grundbetrag + mindermengeBetrag + energieBetrag + transportZuschlagBetrag
                       + werkServiceBetrag + selbstabholerBetrag + verzoegererBetrag;    // Q27

  const materialkostenGesamt = materialkosten * volumen;
  const rohertragGesamt = nettobetrag - materialkostenGesamt;                            // Q28
  const selbstkostenGesamt = selbstkostenI * volumen;
  const db1Gesamt = rohertragGesamt - selbstkostenGesamt;                                // Q29
  const db1ProzentGesamt = nettobetrag !== 0 ? db1Gesamt / nettobetrag : 0;              // Q30

  const basisProM3 = angebotspreis + zuschlaegeProM3;
  const roherloesProM3 = basisProM3 - materialkosten;                                    // D36
  const roherloesProzent = basisProM3 !== 0 ? roherloesProM3 / basisProM3 : 0;           // D37
  const deckungsbeitragProM3 = roherloesProM3 - selbstkostenI;                           // D39
  const deckungsbeitragProzent = basisProM3 !== 0 ? deckungsbeitragProM3 / basisProM3 : 0; // D40

  const warnRoherloes = roherloesProzent < parameter.minRoherlösProzent;                 // F37
  const warnDbZiel = deckungsbeitragProzent < parameter.dbZielProzent;                   // F39 (repariert)
  const warnMindestDb = deckungsbeitragProzent < parameter.minDbProzent;                 // F40

  return {
    sorteObj, materialkosten, sortenpreis, fuhrenAnzahl, transportkostenJeFuhre,
    transportkostenProM3, selbstkostenI, selbstabholung,
    mindermengeSatz, mindermengeMenge, mindermengeBetrag,
    energieSatz, energieBetrag,
    transportZuschlagSatz, transportZuschlagBetrag,
    werkServiceSatz, werkServiceBetrag,
    selbstabholerSatz, selbstabholerBetrag,
    verzoegererSatz, verzoegererBetrag,
    angebotspreis, zuschlaegeProM3, grundbetrag, nettobetrag,
    materialkostenGesamt, rohertragGesamt, selbstkostenGesamt, db1Gesamt, db1ProzentGesamt,
    roherloesProM3, roherloesProzent, deckungsbeitragProM3, deckungsbeitragProzent,
    warnRoherloes, warnDbZiel, warnMindestDb
  };
}

/* ---------------------------------------------------------------------
   5) RENDERING – Formular
   --------------------------------------------------------------------- */
function todayISO(){
  const t = new Date();
  return t.toISOString().slice(0,10);
}

function emptyDraft(){
  return {
    id: null,
    angebotsNr: null,
    kunde: '', kundenkategorie: 'A-Kunde', bauvorhaben: '',
    datum: todayISO(),
    sorte: '', volumen: 20,
    fahrstreckeKm: 30, fahrtdauerMin: 150, ladungProFahrzeug: 6,
    transportZuschlag: null, // null => Parameter-Default verwenden (D19)
    verzoegerer: false,
    nachlass: 0,
    freigabeStatus: 'offen', // 'offen' | 'freigegeben' | 'abgelehnt'
    freigabeVon: '', freigabeDatum: null,
    createdAt: null, updatedAt: null
  };
}

function newDraft(){
  currentDraft = emptyDraft();
  currentId = null;
  unsavedDirty = false;
  render();
}

function loadDraft(id){
  const p = projekte[id];
  if (!p) return;
  currentDraft = { ...emptyDraft(), ...p };
  currentId = id;
  unsavedDirty = false;
  render();
}

function fmtEUR(n){
  return (n<0?'-':'') + Math.abs(n).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' €';
}
function fmtPct(n){
  return (n*100).toLocaleString('de-DE',{minimumFractionDigits:1,maximumFractionDigits:1}) + ' %';
}
function fmtNum(n,dec){
  return n.toLocaleString('de-DE',{minimumFractionDigits:dec==null?2:dec,maximumFractionDigits:dec==null?2:dec});
}

function statusBadge(res){
  if (res.warnMindestDb) return '<span class="badge bad">DB1 kritisch</span>';
  if (res.warnDbZiel || res.warnRoherloes) return '<span class="badge warn">unter Zielwert</span>';
  return '<span class="badge ok">i.O.</span>';
}

function freigabeBadge(status){
  if (status === 'freigegeben') return '<span class="badge ok">Freigegeben</span>';
  if (status === 'abgelehnt') return '<span class="badge bad">Abgelehnt</span>';
  return '<span class="badge warn">Offen</span>';
}

function freigabeStatusBox(d){
  const status = d.freigabeStatus || 'offen';
  if (status === 'freigegeben'){
    return `<div class="warn-box ok"><b>✓ Freigegeben</b>${d.freigabeVon ? ' von ' + escapeHtml(d.freigabeVon) : ''}${d.freigabeDatum ? ' am ' + new Date(d.freigabeDatum).toLocaleDateString('de-DE') : ''}.</div>`;
  }
  if (status === 'abgelehnt'){
    return `<div class="warn-box bad"><b>✕ Abgelehnt</b>${d.freigabeVon ? ' von ' + escapeHtml(d.freigabeVon) : ''}${d.freigabeDatum ? ' am ' + new Date(d.freigabeDatum).toLocaleDateString('de-DE') : ''}. Bitte Rücksprache halten.</div>`;
  }
  return `<div class="warn-box warn"><b>⏳ Noch offen</b> — wartet auf Freigabe durch die Geschäftsleitung.</div>`;
}

function renderProjectList(){
  const list = document.getElementById('projectList');
  const q = (document.getElementById('searchBox').value || '').toLowerCase().trim();
  const entries = Object.entries(projekte)
    .filter(([id,p]) => {
      if (!q) return true;
      return (p.kunde||'').toLowerCase().includes(q)
        || (p.bauvorhaben||'').toLowerCase().includes(q)
        || (p.angebotsNr||'').toLowerCase().includes(q);
    })
    .sort((a,b) => (b[1].updatedAt||0) - (a[1].updatedAt||0));

  document.getElementById('countInfo').textContent = Object.keys(projekte).length + ' Kalkulationen';

  if (entries.length === 0){
    list.innerHTML = '<div class="sidebar-empty">Keine Kalkulationen gefunden.</div>';
    return;
  }
  list.innerHTML = entries.map(([id,p]) => {
    const res = calcKalkulation(p);
    const active = id === currentId ? ' active' : '';
    return `<div class="project-card${active}" data-id="${id}">
      <div class="row1"><span>${p.angebotsNr||''}</span><span>${p.datum||''}</span></div>
      <div class="kunde">${escapeHtml(p.kunde||'(ohne Kunde)')}</div>
      <div class="bauvorhaben">${escapeHtml(p.bauvorhaben||'')}</div>
      ${statusBadge(res)} ${freigabeBadge(p.freigabeStatus)}
    </div>`;
  }).join('');

  list.querySelectorAll('.project-card').forEach(el => {
    el.addEventListener('click', () => {
      if (unsavedDirty && !confirm('Ungespeicherte Änderungen verwerfen?')) return;
      loadDraft(el.dataset.id);
    });
  });
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let sortenDatalistHTML = '';
function renderSortenDatalist(){
  sortenDatalistHTML = sorten.map(s =>
    `<option value="${s.sorte}">${s.sorte} – ${escapeHtml(s.bezeichnung||'—')} (VK ${s.preis!=null?fmtNum(s.preis,2):'–'} €/m³)</option>`
  ).join('');
  const dl = document.getElementById('sortenList');
  if (dl) dl.innerHTML = sortenDatalistHTML;
}

let kundenDatalistHTML = '';
function renderKundenDatalist(){
  kundenDatalistHTML = kunden.map(k => `<option value="${escapeHtml(k.name)}">${escapeHtml(k.kategorie||'')}</option>`).join('');
  const dl = document.getElementById('kundenList');
  if (dl) dl.innerHTML = kundenDatalistHTML;
}
function findKunde(name){
  if (!name) return null;
  const n = String(name).trim().toLowerCase();
  return kunden.find(k => (k.name||'').trim().toLowerCase() === n) || null;
}

let bauvorhabenDatalistHTML = '';
function renderBauvorhabenDatalist(){
  bauvorhabenDatalistHTML = bauvorhaben.map(b => `<option value="${escapeHtml(b.name)}">${escapeHtml(b.adresse||'')}</option>`).join('');
  const dl = document.getElementById('bauvorhabenList');
  if (dl) dl.innerHTML = bauvorhabenDatalistHTML;
}
function findBauvorhaben(name){
  if (!name) return null;
  const n = String(name).trim().toLowerCase();
  return bauvorhaben.find(b => (b.name||'').trim().toLowerCase() === n) || null;
}

function routeUrl(bauvorhabenName){
  const match = findBauvorhaben(bauvorhabenName);
  const ziel = encodeURIComponent(((match && match.adresse) || bauvorhabenName || '').trim());
  return `https://www.google.com/maps/dir/Osterfeld+1,+59846+Sundern/${ziel}`;
}

function showChefEmptyState(){
  document.getElementById('mainArea').innerHTML = `
    <div class="sidebar-empty" style="text-align:left;padding:40px 10px;">
      <h2 style="margin:0 0 6px 0;">Angebotsfreigabe</h2>
      <p style="color:var(--grau-700);max-width:480px;">Bitte links ein Angebot auswählen. Angezeigt werden nur bereits von Pascal/Vertrieb fertig gerechnete und gespeicherte Kalkulationen.</p>
    </div>`;
}

function attachFormHandlers(){
  const bind = (id, prop, parseFn) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('input', () => {
      const raw = el.type === 'checkbox' ? el.checked : el.value;
      currentDraft[prop] = parseFn ? parseFn(raw) : raw;
      unsavedDirty = true;
      render();
      // Fokus wiederherstellen, da render() das Formular neu aufbaut
      const again = document.getElementById(id);
      if (again) { again.focus(); if (again.setSelectionRange && again.type==='text'){ try{ again.setSelectionRange(again.value.length, again.value.length);}catch(e){} } }
    });
  };
  bind('f_kunde','kunde');
  bind('f_kategorie','kundenkategorie');
  bind('f_datum','datum');
  bind('f_bauvorhaben','bauvorhaben');
  bind('f_sorte','sorte');
  bind('f_volumen','volumen', v => Number(v));
  bind('f_fahrstrecke','fahrstreckeKm', v => Number(v));
  bind('f_fahrtdauer','fahrtdauerMin', v => Number(v));
  bind('f_ladung','ladungProFahrzeug', v => Number(v));
  bind('f_frachtkosten','transportZuschlag', v => Number(v));
  bind('f_verzoegerer','verzoegerer', v => !!v);
  bind('f_nachlass','nachlass', v => Number(v));

  const kundeEl = document.getElementById('f_kunde');
  if (kundeEl) kundeEl.addEventListener('change', () => {
    const match = findKunde(kundeEl.value);
    if (match && match.kategorie){
      currentDraft.kundenkategorie = match.kategorie;
      unsavedDirty = true;
      render();
    }
  });

  document.getElementById('btnSave').addEventListener('click', saveCurrent);
  document.getElementById('btnPrint').addEventListener('click', () => window.print());
  document.getElementById('btnUebersicht').addEventListener('click', () => openUebersichtModal(currentDraft));
  const delBtn = document.getElementById('btnDelete');
  if (delBtn) delBtn.addEventListener('click', deleteCurrent);
  const dupBtn = document.getElementById('btnDuplicate');
  if (dupBtn) dupBtn.addEventListener('click', duplicateCurrent);
}

/* ---------------------------------------------------------------------
   6) SPEICHERN / LÖSCHEN / DUPLIZIEREN
   --------------------------------------------------------------------- */
async function nextAngebotsNr(){
  const year = new Date().getFullYear();
  const counterRef = ref(db, 'meta/counter/' + year);
  const result = await runTransaction(counterRef, (curr) => (curr || 0) + 1);
  const n = result.snapshot.val();
  return `KA-${year}-${String(n).padStart(4,'0')}`;
}

async function saveCurrent(){
  try{
    const d = currentDraft;
    if (!d.kunde || !d.bauvorhaben){
      toast('Bitte Kunde und Bauvorhaben angeben.', true);
      return;
    }
    const now = Date.now();
    if (!currentId){
      d.angebotsNr = await nextAngebotsNr();
      d.createdAt = now;
      const newRef = push(ref(db, 'kalkulationen'));
      currentId = newRef.key;
      d.id = currentId;
      d.updatedAt = now;
      await set(newRef, d);
    } else {
      d.updatedAt = now;
      await update(ref(db, 'kalkulationen/' + currentId), d);
    }
    unsavedDirty = false;
    toast('Kalkulation gespeichert.');
    render();
  } catch(err){
    console.error(err);
    toast('Speichern fehlgeschlagen: ' + err.message, true);
  }
}

async function deleteCurrent(){
  if (!currentId) return;
  if (!confirm('Diese Kalkulation wirklich unwiderruflich löschen?')) return;
  try{
    await remove(ref(db, 'kalkulationen/' + currentId));
    toast('Kalkulation gelöscht.');
    newDraft();
  } catch(err){
    toast('Löschen fehlgeschlagen: ' + err.message, true);
  }
}

function duplicateCurrent(){
  currentDraft = { ...currentDraft, id:null, angebotsNr:null, createdAt:null, updatedAt:null, datum: todayISO() };
  currentId = null;
  unsavedDirty = true;
  render();
  toast('Als neue Kalkulation dupliziert – noch nicht gespeichert.');
}

let modalSortenList = [];
let modalKundenList = [];
let modalBauvorhabenList = [];
let sortenNewCounter = 0, kundenNewCounter = 0, bauvorhabenNewCounter = 0;

function findModalEntry(cid){
  return modalSortenList.find(s => s._cid === cid);
}

function renderPriceTableBody(list){
  const body = document.getElementById('priceTableBody');
  body.innerHTML = list.map((s) => `
    <tr data-cid="${s._cid}" ${s._new ? 'data-new="1"' : ''}>
      <td>${s._new ? `<input type="text" class="pt-sorte-new" placeholder="z.B. 140164" value="${escapeHtml(s.sorte||'')}">` : s.sorte}</td>
      <td><input type="text" class="pt-bez" value="${escapeHtml(s.bezeichnung||'')}"></td>
      <td class="num"><input type="number" class="pt-ek" value="${s.ek!=null?Number(s.ek).toFixed(2):''}" step="0.01"></td>
      <td class="num"><input type="number" class="pt-preis" value="${s.preis!=null?Number(s.preis).toFixed(2):''}" step="0.01"></td>
      <td class="num"><input type="number" class="pt-preisneu" value="${s.preis_neu!=null?Number(s.preis_neu).toFixed(2):''}" step="0.01"></td>
      <td>${s._new ? `<button class="btn-ghost pt-remove" title="Zeile verwerfen" style="padding:4px 8px;font-size:11px;">✕</button>` : ''}</td>
    </tr>
  `).join('');

  // Live-Sync: jede Eingabe schreibt sofort zurück in modalSortenList, damit
  // Suche/Filtern zwischendurch keine ungespeicherten Änderungen verwirft.
  body.querySelectorAll('tr').forEach(row => {
    const cid = row.dataset.cid;
    const entry = findModalEntry(cid);
    if (!entry) return;
    const wire = (sel, prop, parse) => {
      const el = row.querySelector(sel);
      if (!el) return;
      el.addEventListener('input', () => { entry[prop] = parse(el.value); });
    };
    if (entry._new) wire('.pt-sorte-new','sorte', v => v.trim());
    wire('.pt-bez','bezeichnung', v => v.trim());
    wire('.pt-ek','ek', v => v === '' ? null : Number(v));
    wire('.pt-preis','preis', v => v === '' ? null : Number(v));
    wire('.pt-preisneu','preis_neu', v => v === '' ? null : Number(v));
  });

  body.querySelectorAll('.pt-remove').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const cid = e.target.closest('tr').dataset.cid;
      modalSortenList = modalSortenList.filter(s => s._cid !== cid);
      renderPriceTableBody(modalSortenList);
      document.getElementById('sortenCount').textContent = modalSortenList.length;
    });
  });
}

/* Excel-Import für Kundendaten (Spaltennamen flexibel/case-insensitiv erkannt) */
function handleKundenExcelImport(e){
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  if (typeof XLSX === 'undefined'){
    toast('Excel-Bibliothek konnte nicht geladen werden (Internetverbindung prüfen).', true);
    return;
  }
  const reader = new FileReader();
  reader.onload = (ev) => {
    try{
      const data = new Uint8Array(ev.target.result);
      const wb = XLSX.read(data, { type: 'array' });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });

      const findCol = (row, ...names) => {
        const keys = Object.keys(row);
        for (const name of names){
          const key = keys.find(k => k.toString().trim().toLowerCase() === name);
          if (key) return row[key];
        }
        return '';
      };

      let neu = 0, aktualisiert = 0;
      rows.forEach(row => {
        const name = String(findCol(row,'kunde','name','kundenname')).trim();
        if (!name) return;
        const kategorie = String(findCol(row,'kategorie','kundenkategorie')).trim() || 'A-Kunde';
        const adresse = String(findCol(row,'adresse','anschrift','ort')).trim();
        const ansprechpartner = String(findCol(row,'ansprechpartner','kontakt','ansprechpartner/in')).trim();
        const telefon = String(findCol(row,'telefon','tel','telefonnummer')).trim();
        const email = String(findCol(row,'e-mail','email','mail')).trim();

        const existing = modalKundenList.find(k => (k.name||'').trim().toLowerCase() === name.toLowerCase());
        if (existing){
          existing.kategorie = kategorie || existing.kategorie;
          existing.adresse = adresse || existing.adresse;
          existing.ansprechpartner = ansprechpartner || existing.ansprechpartner;
          existing.telefon = telefon || existing.telefon;
          existing.email = email || existing.email;
          aktualisiert++;
        } else {
          kundenNewCounter++;
          modalKundenList.push({ name, kategorie, adresse, ansprechpartner, telefon, email, _cid: 'newkunde_import_'+kundenNewCounter });
          neu++;
        }
      });

      document.getElementById('kundenSearch').value = '';
      renderKundenTableBody(modalKundenList);
      toast(`Excel-Import: ${neu} neue Kunden, ${aktualisiert} aktualisiert. Bitte prüfen und dann „Speichern" klicken.`);
    } catch(err){
      console.error(err);
      toast('Excel-Import fehlgeschlagen: ' + err.message, true);
    } finally {
      e.target.value = '';
    }
  };
  reader.readAsArrayBuffer(file);
}

async function saveSettingsFromModal(){
  try{
    const newParams = {
      lkwKostenProStunde: Number(document.getElementById('p_lkw').value),
      standardLadung: Number(document.getElementById('p_std').value),
      mischenProM3: Number(document.getElementById('p_mischen').value),
      mindermengeZuschlagProM3: Number(document.getElementById('p_mindermenge').value),
      energieZuschlagProM3: Number(document.getElementById('p_energie').value),
      transportZuschlagProM3: Number(document.getElementById('p_fracht').value),
      werkServiceZuschlagProM3: Number(document.getElementById('p_werkservice').value),
      selbstabholerVerguetungProM3: Number(document.getElementById('p_selbstabholer').value),
      verzoegererZuschlagProM3: Number(document.getElementById('p_verzoegerer').value),
      minRoherlösProzent: Number(document.getElementById('p_minroherlos').value) / 100,
      dbZielProzent: Number(document.getElementById('p_dbziel').value) / 100,
      minDbProzent: Number(document.getElementById('p_mindb').value) / 100,
      preiswechselDatum: document.getElementById('p_stichtag').value.trim()
    };
    await set(ref(db, 'settings/parameter'), newParams);

    const sortenUpdate = {};
    const seenCodes = new Set();
    let skipped = false;
    modalSortenList.forEach(entry => {
      const code = String(entry.sorte || '').trim();
      if (!code){ skipped = true; return; } // Zeile ohne Sorten-Nr. -> überspringen
      if (seenCodes.has(code)){ skipped = true; return; } // Duplikat -> überspringen
      seenCodes.add(code);
      sortenUpdate[code] = {
        sorte: isNaN(Number(code)) ? code : Number(code),
        bezeichnung: (entry.bezeichnung || '').toString().trim() || null,
        ek: entry.ek == null || entry.ek === '' ? null : round2(Number(entry.ek)),
        preis: entry.preis == null || entry.preis === '' ? null : round2(Number(entry.preis)),
        preis_neu: entry.preis_neu == null || entry.preis_neu === '' ? null : round2(Number(entry.preis_neu))
      };
    });
    if (skipped){
      toast('Einige Zeilen ohne gültige/eindeutige Sorten-Nr. wurden übersprungen.', true);
    }
    await set(ref(db, 'settings/sorten'), sortenUpdate);

    const kundenById = {};
    modalKundenList.forEach(entry => {
      const name = (entry.name || '').toString().trim();
      if (!name) return; // Zeile ohne Namen -> überspringen
      const id = entry.id || push(ref(db, 'settings/kunden')).key;
      kundenById[id] = {
        name,
        kategorie: entry.kategorie || 'A-Kunde',
        adresse: (entry.adresse || '').toString().trim(),
        ansprechpartner: (entry.ansprechpartner || '').toString().trim(),
        telefon: (entry.telefon || '').toString().trim(),
        email: (entry.email || '').toString().trim()
      };
    });
    await set(ref(db, 'settings/kunden'), kundenById);

    const bauvorhabenById = {};
    modalBauvorhabenList.forEach(entry => {
      const name = (entry.name || '').toString().trim();
      if (!name) return; // Zeile ohne Namen -> überspringen
      const id = entry.id || push(ref(db, 'settings/bauvorhaben')).key;
      bauvorhabenById[id] = {
        name,
        adresse: (entry.adresse || '').toString().trim(),
        kunde: (entry.kunde || '').toString().trim(),
        notiz: (entry.notiz || '').toString().trim()
      };
    });
    await set(ref(db, 'settings/bauvorhaben'), bauvorhabenById);

    toast('Einstellungen gespeichert.');
    closeModal();
    render();
  } catch(err){
    console.error(err);
    toast('Speichern fehlgeschlagen: ' + err.message, true);
  }
}

/* ---------------------------------------------------------------------
   8) SONSTIGES – Suche, Neu-Button, CSV-Export
   --------------------------------------------------------------------- */
document.getElementById('searchBox').addEventListener('input', renderProjectList);
document.getElementById('btnNew').addEventListener('click', () => {
  if (unsavedDirty && !confirm('Ungespeicherte Änderungen verwerfen?')) return;
  newDraft();
});
document.getElementById('btnExport').addEventListener('click', () => {
  const rows = Object.values(projekte).map(p => {
    const r = calcKalkulation(p);
    return [p.angebotsNr, p.datum, p.kunde, p.bauvorhaben, p.sorte, p.volumen,
      round2(r.angebotspreis), round2(r.nettobetrag), round2(r.roherloesProM3),
      round2(r.roherloesProzent*100), round2(r.deckungsbeitragProM3), round2(r.deckungsbeitragProzent*100)
    ].map(v => `"${String(v??'').replace(/"/g,'""')}"`).join(';');
  });
  const header = ['Angebots-Nr','Datum','Kunde','Bauvorhaben','Sorte','Volumen_m3','Angebotspreis_EUR_m3',
    'Nettobetrag_EUR','Roherloes_EUR_m3','Roherloes_Prozent','DB1_EUR_m3','DB1_Prozent'].join(';');
  const csv = '\uFEFF' + header + '\n' + rows.join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'kalkulationen_export_' + todayISO() + '.csv';
  a.click();
  URL.revokeObjectURL(url);
});

</script>
</body>
